<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fengyou Liu — Engineer & Builder</title>
  <meta name="description" content="Fengyou Liu, Princeton '29 — Electrical & Aerospace Engineering. Building things that fly, think, and occasionally explode." />

  <!-- Open Graph -->
  <meta property="og:title" content="Fengyou Liu" />
  <meta property="og:description" content="Princeton '29 · EE & Aerospace · Builder of things." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.fengyou.org" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

  <!-- CUSTOM CURSOR -->
  <div class="cursor" id="cursor">
    <div class="cursor-core"></div>
    <div class="cursor-aura">
      <span class="cursor-label"></span>
    </div>
  </div>

  <!-- NOISE OVERLAY -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ATMOSPHERE — clouds & wind -->
  <div class="atmosphere" aria-hidden="true">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
  </div>

  <!-- THREE.JS CANVAS -->
  <canvas id="three-canvas" aria-hidden="true"></canvas>

  <!-- DOT GRID TEXTURE -->
  <div class="dot-grid" aria-hidden="true"></div>

  <!-- NAVIGATION -->
  <nav id="main-nav" aria-label="Main navigation">
    <a href="#hero" class="nav-wordmark">FENGYOU</a>
    <div class="nav-right">
      <div class="nav-sections">
        <button class="nav-dot" data-section="hero" data-index="01" aria-label="Hero section">
          <span class="nav-num">01</span>
          <span class="nav-indicator"></span>
          <span class="nav-tooltip">Home</span>
        </button>
        <button class="nav-dot" data-section="about" data-index="02" aria-label="About section">
          <span class="nav-num">02</span>
          <span class="nav-indicator"></span>
          <span class="nav-tooltip">About</span>
        </button>
        <button class="nav-dot" data-section="skills" data-index="03" aria-label="Skills section">
          <span class="nav-num">03</span>
          <span class="nav-indicator"></span>
          <span class="nav-tooltip">Skills</span>
        </button>
        <button class="nav-dot" data-section="projects" data-index="04" aria-label="Projects section">
          <span class="nav-num">04</span>
          <span class="nav-indicator"></span>
          <span class="nav-tooltip">Projects</span>
        </button>
        <button class="nav-dot" data-section="experience" data-index="05" aria-label="Experience section">
          <span class="nav-num">05</span>
          <span class="nav-indicator"></span>
          <span class="nav-tooltip">Experience</span>
        </button>
        <button class="nav-dot" data-section="contact" data-index="06" aria-label="Contact section">
          <span class="nav-num">06</span>
          <span class="nav-indicator"></span>
          <span class="nav-tooltip">Contact</span>
        </button>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- ALTITUDE METER -->
  <div class="altitude-meter" id="altitude-meter" aria-hidden="true">
    <div class="alt-track">
      <div class="alt-tick" style="top: 0%"></div>
      <div class="alt-tick" style="top: 15%"></div>
      <div class="alt-tick" style="top: 35%"></div>
      <div class="alt-tick" style="top: 55%"></div>
      <div class="alt-tick" style="top: 80%"></div>
      <div class="alt-tick" style="top: 92%"></div>
      <div class="alt-indicator" id="alt-indicator">
        <span class="alt-line"></span>
      </div>
    </div>
    <div class="alt-readout">
      <span class="alt-label">ALT</span>
      <span class="alt-value" id="alt-value">0</span>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 1: HERO                            -->
  <!-- ═══════════════════════════════════════════ -->
  <section id="hero" class="section section-hero">
    <!-- CONTENT:hero -->
    <div class="scroll-prompt" id="scroll-prompt">
      <svg width="16" height="24" viewBox="0 0 16 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 4 L8 16 M3 12 L8 17 L13 12"/>
      </svg>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 2: ABOUT                           -->
  <!-- ═══════════════════════════════════════════ -->
  <section id="about" class="section section-about">
    <!-- CONTENT:about -->
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 3: SKILLS                          -->
  <!-- ═══════════════════════════════════════════ -->
  <section id="skills" class="section section-skills">
    <!-- CONTENT:skills -->
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 4: PROJECTS                        -->
  <!-- ═══════════════════════════════════════════ -->
  <section id="projects" class="section section-projects">
    <!-- CONTENT:projects -->
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 5: EXPERIENCE                      -->
  <!-- ═══════════════════════════════════════════ -->
  <section id="experience" class="section section-experience">
    <!-- CONTENT:experience -->
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 6: CONTACT                         -->
  <!-- ═══════════════════════════════════════════ -->
  <section id="contact" class="section section-contact">
    <!-- CONTENT:contact -->
  </section>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SECTION 7: FOOTER                          -->
  <!-- ═══════════════════════════════════════════ -->
  <footer id="site-footer" class="section section-footer">
    <!-- CONTENT:footer -->
  </footer>

  <script type="module" src="./scripts/main.js"></script>
</body>
</html>
